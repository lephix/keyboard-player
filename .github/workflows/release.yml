name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: kb-player-bevy

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/${{ env.BINARY_NAME }} \
            target/aarch64-apple-darwin/release/${{ env.BINARY_NAME }} \
            -output ${{ env.BINARY_NAME }}

      - name: Create .app bundle
        run: |
          APP_NAME="KeyboardPlayer.app"
          VERSION="${GITHUB_REF_NAME#v}"

          mkdir -p "$APP_NAME/Contents/MacOS"
          mkdir -p "$APP_NAME/Contents/Resources"

          cp "${{ env.BINARY_NAME }}" "$APP_NAME/Contents/MacOS/"
          cp -r assets "$APP_NAME/Contents/Resources/"

          cat > "$APP_NAME/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Keyboard Player</string>
              <key>CFBundleDisplayName</key>
              <string>Keyboard Player</string>
              <key>CFBundleIdentifier</key>
              <string>com.lephix.keyboard-player</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleExecutable</key>
              <string>${{ env.BINARY_NAME }}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
          </dict>
          </plist>
          PLIST

      - name: Package zip
        run: |
          zip -r "keyboard-player-${GITHUB_REF_NAME}-macos.zip" KeyboardPlayer.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: keyboard-player-*-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows

      - name: Build
        run: cargo build --release

      - name: Package zip
        shell: bash
        run: |
          STAGE_DIR="keyboard-player"
          mkdir -p "$STAGE_DIR"
          cp "target/release/${{ env.BINARY_NAME }}.exe" "$STAGE_DIR/"
          cp -r assets "$STAGE_DIR/"
          7z a "keyboard-player-${GITHUB_REF_NAME}-windows-x64.zip" "$STAGE_DIR"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: keyboard-player-*-windows-x64.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            keyboard-player-*-macos.zip
            keyboard-player-*-windows-x64.zip
